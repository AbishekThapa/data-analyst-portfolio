<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Mode Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  <style>
    .dark .test-box {
      background-color: #1f2937;
      color: #f9fafb;
    }
  </style>
</head>
<body class="bg-white dark:bg-gray-900 text-black dark:text-white">
  <div class="container mx-auto p-8">
    <h1 class="text-3xl font-bold mb-4">Dark Mode Test</h1>
    
    <div class="test-box p-4 bg-gray-100 dark:bg-gray-800 mb-4 rounded">
      <p>This box should change color when dark mode is toggled</p>
    </div>
    
    <button id="theme-toggle" class="px-4 py-2 bg-blue-500 text-white rounded">
      Toggle Dark Mode
    </button>
    
    <div class="mt-4">
      <p>Current theme: <span id="theme-status">light</span></p>
      <p>Dark class present: <span id="dark-status">false</span></p>
    </div>
  </div>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const themeStatus = document.getElementById('theme-status');
    const darkStatus = document.getElementById('dark-status');
    
    function updateStatus() {
      const isDark = document.documentElement.classList.contains('dark');
      themeStatus.textContent = isDark ? 'dark' : 'light';
      darkStatus.textContent = isDark ? 'true' : 'false';
    }
    
    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      updateStatus();
      console.log('Theme toggled');
    });
    
    updateStatus();
  </script>
</body>
</html>
